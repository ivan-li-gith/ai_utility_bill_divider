<div class="modal fade" id="addGroupModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="addGroupModalLabel">Add New</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form action="{{ url_for('groups.create') }}" method="POST" id="add-group-form">
                    
                    <input type="hidden" name="group_type" id="add-group-type" value="group">

                    <div class="mb-3" id="add-group-name-container">
                        <label for="add-group-name" class="form-label">Group Name</label>
                        <input type="text" class="form-control" name="group_name" id="add-group-name" placeholder="e.g. 123 Main St Roommates">
                    </div>

                    <hr>
                    <h6 class="mb-3">Members</h6>
                    
                    <div id="add-members-container"></div>

                    <button type="button" class="btn btn-sm btn-outline-secondary mb-3" id="btn-add-member-row">
                        + Add Another Member
                    </button>

                    <div class="modal-footer px-0 pb-0 mt-3 border-top pt-3">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary">Save</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
