{% extends "auth_base.html" %}
{% block title %}Sign Up{% endblock %}
{% block header %}SIGN UP{% endblock %}

{% block form %}
<form method="POST">
    <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" placeholder="admin@gmail.com" required>
    </div>
    <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" required>
        <small style="color: #666; font-size: 0.8rem; display: block; margin-top: 0.25rem;">
            Must be 8+ characters with 1 number and 1 special character.
        </small>
    </div>
    <button type="submit" class="btn btn-pink">SIGN UP</button>
</form>
{% endblock %}

{% block footer_text %}
Already a user? <a href="{{ url_for('auth.login') }}" style="text-decoration: none; color: #eb4f7a;">LOGIN</a>
{% endblock %}
