{% extends "auth_base.html" %}
{% block title %}Login{% endblock %}
{% block header %}LOGIN{% endblock %}

{% block form %}
<form method="POST">
    <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" required placeholder="admin@gmail.com">
    </div>
    <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" required>
    </div>
    <button type="submit" class="btn btn-pink">LOGIN</button>
</form>
{% endblock %}

{% block footer_text %}
Don't have an account? <a href="{{ url_for('auth.signup') }}" class="text-decoration-none">SIGN UP</a>
{% endblock %}
